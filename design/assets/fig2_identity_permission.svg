<svg viewBox="0 0 860 580" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <rect width="860" height="580" fill="#f8f8f8"/>
  <text x="430" y="30" text-anchor="middle" font-size="15" font-weight="700" fill="#111">多人支持 · 身份识别与权限体系</text>
  <text x="430" y="46" text-anchor="middle" font-size="10" fill="#888">Layer 1 · 从信号采集到行动授权</text>
  <text x="24" y="72" font-size="9" font-weight="600" letter-spacing="1" fill="#999">INPUT · 多模态信号</text>
  <rect x="20" y="80" width="170" height="60" rx="7" fill="#fff" stroke="#6C8EBD" stroke-width="1.4"/>
  <rect x="20" y="80" width="170" height="8" rx="7" fill="#6C8EBD"/>
  <text x="105" y="104" text-anchor="middle" font-size="11" font-weight="600" fill="#3a5a8a">人脸识别</text>
  <text x="105" y="119" text-anchor="middle" font-size="9.5" fill="#666">正脸高精度 · 遮挡时降权</text>
  <text x="105" y="132" text-anchor="middle" font-size="9" fill="#999">主力信号</text>
  <rect x="206" y="80" width="170" height="60" rx="7" fill="#fff" stroke="#82b366" stroke-width="1.4"/>
  <rect x="206" y="80" width="170" height="8" rx="7" fill="#82b366"/>
  <text x="291" y="104" text-anchor="middle" font-size="11" font-weight="600" fill="#3a6b3a">步态识别</text>
  <text x="291" y="119" text-anchor="middle" font-size="9.5" fill="#666">背对/远距/侧身时有效</text>
  <text x="291" y="132" text-anchor="middle" font-size="9" fill="#999">被动采集</text>
  <rect x="392" y="80" width="170" height="60" rx="7" fill="#fff" stroke="#d6a520" stroke-width="1.4"/>
  <rect x="392" y="80" width="170" height="8" rx="7" fill="#d6a520"/>
  <text x="477" y="104" text-anchor="middle" font-size="11" font-weight="600" fill="#7a5a00">声纹识别</text>
  <text x="477" y="119" text-anchor="middle" font-size="9.5" fill="#666">开口即采集 · 感冒时交叉验</text>
  <text x="477" y="132" text-anchor="middle" font-size="9" fill="#999">自然采集</text>
  <rect x="578" y="80" width="262" height="60" rx="7" fill="#fff" stroke="#b85450" stroke-width="1.4"/>
  <rect x="578" y="80" width="262" height="8" rx="7" fill="#b85450"/>
