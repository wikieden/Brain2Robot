<svg viewBox="0 0 900 560" xmlns="http://www.w3.org/2000/svg" role="img" font-family="ui-monospace, 'SF Mono', monospace">
  <title>L3 认知层架构总览</title>
  <desc>L3 认知层数据流图，展示频率协调、四层提示词结构与否定性学习闭环</desc>

  <rect width="900" height="560" fill="#0f172a" rx="10"/>
  <text x="450" y="30" text-anchor="middle" font-size="14" font-weight="700" fill="#e2e8f0">L3 认知层 · 数据流与频率协调</text>
  <text x="450" y="46" text-anchor="middle" font-size="10" fill="#475569">否定性学习 · 四层提示词 · SubTask 规划</text>

  <defs>
    <marker id="ah-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#3b82f6"/></marker>
    <marker id="ah-purple" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#7c3aed"/></marker>
    <marker id="ah-amber" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#d97706"/></marker>
    <marker id="ah-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#16a34a"/></marker>
    <marker id="ah-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#dc2626"/></marker>
    <marker id="ah-cyan" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#0891b2"/></marker>
  </defs>

  <!-- Inputs -->
  <rect x="12" y="62" width="138" height="62" rx="5" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="81" y="82" text-anchor="middle" font-size="10" fill="#94a3b8">传感器</text>
  <text x="81" y="97" text-anchor="middle" font-size="9" fill="#64748b">摄像头 · 麦克风</text>
  <text x="81" y="112" text-anchor="middle" font-size="9" fill="#64748b">深度相机</text>

  <rect x="12" y="142" width="138" height="42" rx="5" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="81" y="160" text-anchor="middle" font-size="10" fill="#94a3b8">用户指令</text>
  <text x="81" y="175" text-anchor="middle" font-size="9" fill="#64748b">语音 / 文字</text>

  <rect x="12" y="202" width="138" height="42" rx="5" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="81" y="220" text-anchor="middle" font-size="10" fill="#94a3b8">偏好记忆</text>
  <text x="81" y="235" text-anchor="middle" font-size="9" fill="#64748b">Top-15 语义检索</text>

  <rect x="12" y="262" width="138" height="42" rx="5" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="81" y="280" text-anchor="middle" font-size="10" fill="#94a3b8">场景记忆</text>
  <text x="81" y="295" text-anchor="middle" font-size="9" fill="#64748b">ConceptGraphs</text>

  <!-- L3 Container -->
  <rect x="168" y="56" width="560" height="460" rx="8" fill="none" stroke="#1e40af" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="182" y="70" font-size="9" fill="#3b82f6">L3 认知层</text>

  <!-- Phenomenal Layer -->
  <rect x="178" y="76" width="228" height="90" rx="6" fill="#1e1b4b" stroke="#5b21b6" stroke-width="1.5"/>
  <rect x="362" y="78" width="38" height="15" rx="3" fill="#5b21b6"/>
  <text x="381" y="89" text-anchor="middle" font-size="8" font-weight="700" fill="#ddd8fe">2 Hz</text>
  <text x="292" y="101" text-anchor="middle" font-size="11" font-weight="600" fill="#a78bfa">现象层</text>
  <text x="292" y="116" text-anchor="middle" font-size="9" fill="#6d28d9">Phenomenal Layer</text>
  <text x="292" y="132" text-anchor="middle" font-size="9" fill="#94a3b8">四路感知融合 → 人类状态快照</text>
  <text x="292" y="148" text-anchor="middle" font-size="8.5" fill="#64748b">表情 · 韵律 · 姿态 · 视线</text>
  <text x="292" y="162" text-anchor="middle" font-size="8.5" fill="#64748b">→ social_context 注入 L4</text>

  <!-- Conative Engine -->
  <rect x="420" y="76" width="230" height="90" rx="6" fill="#1c1917" stroke="#b45309" stroke-width="1.5"/>
  <rect x="604" y="78" width="38" height="15" rx="3" fill="#b45309"/>
  <text x="623" y="89" text-anchor="middle" font-size="8" font-weight="700" fill="#fef3c7">5 Hz</text>
  <text x="535" y="101" text-anchor="middle" font-size="11" font-weight="600" fill="#fbbf24">冲动发生器</text>
  <text x="535" y="116" text-anchor="middle" font-size="9" fill="#d97706">Conative Engine</text>
  <text x="535" y="132" text-anchor="middle" font-size="9" fill="#94a3b8">规则检测层 + LLM 节流层</text>
  <text x="535" y="148" text-anchor="middle" font-size="8.5" fill="#64748b">非安全触发 → 触发队列</text>
  <text x="535" y="162" text-anchor="middle" font-size="8.5" fill="#ef4444">安全类 → 直通 L2 ⚡</text>

  <!-- LLM Planner -->
  <rect x="178" y="185" width="540" height="318" rx="6" fill="#0c1e36" stroke="#1d4ed8" stroke-width="1.5"/>
  <rect x="670" y="187" width="38" height="15" rx="3" fill="#1d4ed8"/>
  <text x="689" y="198" text-anchor="middle" font-size="8" font-weight="700" fill="#bfdbfe">1 Hz</text>
  <text x="448" y="208" text-anchor="middle" font-size="11" font-weight="600" fill="#60a5fa">SubTask 规划器 · LLM 节流裁决</text>
  <text x="448" y="222" text-anchor="middle" font-size="9" fill="#3b82f6">Qwen3-7B INT4 · ~700ms/次</text>

  <!-- Layer 1 -->
  <rect x="190" y="232" width="516" height="36" rx="4" fill="#1a1500" stroke="#a16207" stroke-width="1"/>
  <text x="204" y="248" font-size="9" font-weight="700" fill="#fbbf24">L1 · 系统提示</text>
  <text x="204" y="261" font-size="8.5" fill="#92400e">身份 · 能力清单 · 安全硬约束 · 输出格式规范  ~300t</text>
  <rect x="634" y="236" width="64" height="14" rx="3" fill="#78350f"/>
  <text x="666" y="246" text-anchor="middle" font-size="8" fill="#fef3c7">KV-cache ✓</text>

  <!-- Layer 2 -->
  <rect x="190" y="274" width="516" height="32" rx="4" fill="#001a1a" stroke="#0e7490" stroke-width="1"/>
  <text x="204" y="288" font-size="9" font-weight="700" fill="#22d3ee">L2 · 场景上下文</text>
  <text x="204" y="300" font-size="8.5" fill="#164e63">ConceptGraphs 压缩描述，场景变化时刷新  ~100t</text>

  <!-- Layer 3 -->
  <rect x="190" y="312" width="516" height="38" rx="4" fill="#1a0505" stroke="#991b1b" stroke-width="1"/>
  <text x="204" y="328" font-size="9" font-weight="700" fill="#f87171">L3 · 任务状态 + 失败记录</text>
  <text x="204" y="342" font-size="8.5" fill="#7f1d1d">已完成 · 待执行 · FAILED[否定约束] · 机器人状态  ~80t</text>
  <rect x="620" y="316" width="78" height="13" rx="2" fill="#7f1d1d"/>
  <text x="659" y="325" text-anchor="middle" font-size="7.5" fill="#fca5a5">← L2 错误注入</text>

  <!-- Layer 4 -->
  <rect x="190" y="356" width="516" height="32" rx="4" fill="#0f0a1f" stroke="#6d28d9" stroke-width="1"/>
  <text x="204" y="370" font-size="9" font-weight="700" fill="#c084fc">L4 · 用户指令 + 社交上下文</text>
  <text x="204" y="382" font-size="8.5" fill="#4c1d95">实时指令 · social_context · 偏好 Top-15  ~80t</text>

  <text x="448" y="414" text-anchor="middle" font-size="9" fill="#475569">总输入 ~560 tokens  ·  输出 SubTask[] ~150 tokens</text>

  <!-- Retry logic -->
  <rect x="190" y="426" width="516" height="64" rx="4" fill="#0a1a0a" stroke="#15803d" stroke-width="1"/>
  <text x="204" y="442" font-size="9" font-weight="700" fill="#4ade80">否定性学习 · 重规划逻辑</text>
  <text x="204" y="457" font-size="8.5" fill="#166534">单 SubTask 最多重试 3 次 · 整体重规划最多 2 轮</text>
  <text x="204" y="471" font-size="8.5" fill="#166534">超限 → 安全类停机 / 任务类请求用户介入 / 技能缺口反馈蒸馏管道</text>
  <text x="204" y="484" font-size="8" fill="#064e3b">显式否定约束注入 L3 槽位："GRASP_FAILED: 禁止再次侧面抓取"</text>

  <!-- Output -->
  <rect x="742" y="270" width="142" height="48" rx="5" fill="#052e16" stroke="#16a34a" stroke-width="1.5"/>
  <text x="813" y="292" text-anchor="middle" font-size="11" font-weight="700" fill="#4ade80">SubTask[]</text>
  <text x="813" y="308" text-anchor="middle" font-size="9" fill="#15803d">→ L2 协调层</text>

  <!-- L2 Error Report -->
  <rect x="742" y="350" width="142" height="60" rx="5" fill="#1c0505" stroke="#dc2626" stroke-width="1.5"/>
  <text x="813" y="370" text-anchor="middle" font-size="10" font-weight="700" fill="#f87171">L2 错误上报</text>
  <text x="813" y="385" text-anchor="middle" font-size="8.5" fill="#b91c1c">GRASP_FAILED</text>
  <text x="813" y="399" text-anchor="middle" font-size="8.5" fill="#b91c1c">PRECONDITION_FAILED</text>
  <text x="813" y="412" text-anchor="middle" font-size="8.5" fill="#b91c1c">NAVIGATION_BLOCKED …</text>

  <!-- Arrows -->
  <line x1="150" y1="88" x2="176" y2="110" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#ah-purple)"/>
  <path d="M150,163 C160,163 164,370 188,370" fill="none" stroke="#6d28d9" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#ah-purple)"/>
  <path d="M150,223 C162,223 166,375 188,375" fill="none" stroke="#6d28d9" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#ah-purple)"/>
  <path d="M150,283 C162,283 166,287 188,287" fill="none" stroke="#0891b2" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#ah-cyan)"/>
  <line x1="406" y1="120" x2="418" y2="120" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#ah-purple)"/>
  <path d="M292,166 L292,202 L448,202 L448,228" fill="none" stroke="#6d28d9" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#ah-purple)"/>
  <path d="M535,166 L535,202 L448,202 L448,228" fill="none" stroke="#d97706" stroke-width="1.5" marker-end="url(#ah-amber)"/>
  <path d="M650,120 C700,120 720,294 740,294" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ah-red)"/>
  <line x1="718" y1="330" x2="740" y2="295" stroke="#16a34a" stroke-width="2" marker-end="url(#ah-green)"/>
  <path d="M813,350 L813,330 L870,330 L870,500 L330,500 L330,352" fill="none" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ah-red)"/>

  <!-- Legend -->
  <rect x="12" y="430" width="138" height="82" rx="5" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="81" y="446" text-anchor="middle" font-size="9" font-weight="600" fill="#94a3b8">图例</text>
  <line x1="22" y1="458" x2="50" y2="458" stroke="#6d28d9" stroke-width="1.5"/>
  <text x="56" y="461" font-size="8.5" fill="#94a3b8">感知/社交信号</text>
  <line x1="22" y1="472" x2="50" y2="472" stroke="#d97706" stroke-width="1.5"/>
  <text x="56" y="475" font-size="8.5" fill="#94a3b8">触发信号</text>
  <line x1="22" y1="486" x2="50" y2="486" stroke="#16a34a" stroke-width="1.5"/>
  <text x="56" y="489" font-size="8.5" fill="#94a3b8">SubTask 输出</text>
  <line x1="22" y1="500" x2="50" y2="500" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="56" y="503" font-size="8.5" fill="#94a3b8">失败闭环 / 安全直通</text>
</svg>
