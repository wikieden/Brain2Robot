<svg viewBox="0 0 860 620" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <title>偏好记忆 → L3 认知层接口设计</title>
  <rect width="860" height="620" fill="#f8f8f8"/>
  <text x="430" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#111">偏好记忆 → L3 认知层接口</text>
  <text x="430" y="44" text-anchor="middle" font-size="10" fill="#888">四类输入 · 分层检索 · 冲突裁判 · 结果反哺</text>
  <text x="24" y="64" font-size="9" font-weight="600" letter-spacing="1" fill="#999">INPUTS · L3 每次调用的四类注入信息</text>
  <rect x="20" y="72" width="185" height="66" rx="7" fill="#fff" stroke="#82b366" stroke-width="1.4"/>
  <rect x="20" y="72" width="185" height="6" rx="7" fill="#82b366"/>
  <text x="112" y="92" text-anchor="middle" font-size="10" font-weight="700" fill="#3a6b3a">① 场景上下文</text>
  <text x="112" y="107" text-anchor="middle" font-size="9" fill="#555">实时感知 · 每次刷新</text>
  <text x="112" y="120" text-anchor="middle" font-size="9" fill="#777">房间状态 · 物体属性</text>
  <text x="112" y="133" text-anchor="middle" font-size="9" fill="#999">压缩至 ~100 tokens</text>
  <rect x="220" y="72" width="185" height="66" rx="7" fill="#fff" stroke="#6C8EBD" stroke-width="1.4"/>
  <rect x="220" y="72" width="185" height="6" rx="7" fill="#6C8EBD"/>
  <text x="312" y="92" text-anchor="middle" font-size="10" font-weight="700" fill="#3a5a8a">② 身份与权限</text>
  <text x="312" y="107" text-anchor="middle" font-size="9" fill="#555">识别层输出 · 实时</text>
  <text x="312" y="120" text-anchor="middle" font-size="9" fill="#777">person_id · 权限级别</text>
  <text x="312" y="133" text-anchor="middle" font-size="9" fill="#999">置信度 · 识别方式</text>
  <rect x="420" y="72" width="210" height="66" rx="7" fill="#fff" stroke="#d6a520" stroke-width="1.4"/>
  <rect x="420" y="72" width="210" height="6" rx="7" fill="#d6a520"/>
  <text x="525" y="92" text-anchor="middle" font-size="10" font-weight="700" fill="#7a5a00">③ 偏好记忆（检索）</text>
  <text x="525" y="107" text-anchor="middle" font-size="9" fill="#555">从偏好库 RAG 召回</text>
  <text x="525" y="120" text-anchor="middle" font-size="9" fill="#777">10–15条 · ~50 tokens</text>
  <text x="525" y="133" text-anchor="middle" font-size="9" fill="#999">带来源/强度/时效标注</text>
  <rect x="646" y="72" width="194" height="66" rx="7" fill="#fff" stroke="#b85450" stroke-width="1.4"/>
  <rect x="646" y="72" width="194" height="6" rx="7" fill="#b85450"/>
  <text x="743" y="92" text-anchor="middle" font-size="10" font-weight="700" fill="#8a2020">④ 任务状态</text>
  <text x="743" y="107" text-anchor="middle" font-size="9" fill="#555">重规划时注入</text>
  <text x="743" y="120" text-anchor="middle" font-size="9" fill="#777">已完成子任务</text>
  <text x="743" y="133" text-anchor="middle" font-size="9" fill="#999">失败原因 · 重试次数</text>
  <line x1="525" y1="138" x2="525" y2="158" stroke="#aaa" stroke-width="1.3" marker-end="url(#d)"/>
  <text x="420" y="174" font-size="9" font-weight="600" letter-spacing="1" fill="#999">RETRIEVAL · 偏好检索两步走（针对③）</text>
  <rect x="420" y="180" width="210" height="86" rx="7" fill="#FEF9E7" stroke="#d6a520" stroke-width="1.2"/>
  <text x="525" y="198" text-anchor="middle" font-size="10" font-weight="600" fill="#7a5a00">Step 1 · 结构化粗筛</text>
  <text x="525" y="213" text-anchor="middle" font-size="9" fill="#555">字段匹配：person_id × 情境类型</text>
  <text x="525" y="227" text-anchor="middle" font-size="9" fill="#555">× 触发行为类型</text>
  <text x="525" y="241" text-anchor="middle" font-size="9" fill="#777">三维同时匹配 · 精确过滤</text>
  <text x="525" y="255" text-anchor="middle" font-size="9" fill="#999">避免语义模糊导致的误召回</text>
  <line x1="525" y1="266" x2="525" y2="282" stroke="#d6a520" stroke-width="1.2" marker-end="url(#d)"/>
  <rect x="420" y="282" width="210" height="66" rx="7" fill="#FEF9E7" stroke="#d6a520" stroke-width="1.2"/>
  <text x="525" y="300" text-anchor="middle" font-size="10" font-weight="600" fill="#7a5a00">Step 2 · 语义精排</text>
  <text x="525" y="315" text-anchor="middle" font-size="9" fill="#555">粗筛结果内做语义相似度排序</text>
  <text x="525" y="329" text-anchor="middle" font-size="9" fill="#777">取 Top-15 · 压缩序列化</text>
  <text x="525" y="341" text-anchor="middle" font-size="9" fill="#999">格式：情境→行为→结果 [次数,强度]</text>
  <text x="24" y="174" font-size="9" font-weight="600" letter-spacing="1" fill="#999">ANNOTATION · 信号分层标注</text>
  <rect x="20" y="180" width="390" height="110" rx="7" fill="#fff" stroke="#6C8EBD" stroke-width="1.2"/>
  <text x="215" y="198" text-anchor="middle" font-size="10" font-weight="600" fill="#3a5a8a">每条注入信息携带三个标签</text>
  <rect x="34" y="206" width="110" height="74" rx="5" fill="#EBF3FB" stroke="#6C8EBD" stroke-width="0.8"/>
  <text x="89" y="222" text-anchor="middle" font-size="9.5" font-weight="600" fill="#3a5a8a">来源类型</text>
  <text x="89" y="237" text-anchor="middle" font-size="9" fill="#555">实时观察</text>
  <text x="89" y="250" text-anchor="middle" font-size="9" fill="#555">历史偏好</text>
  <text x="89" y="263" text-anchor="middle" font-size="9" fill="#555">显式声明</text>
  <text x="89" y="275" text-anchor="middle" font-size="8.5" fill="#888">↑ 可信度递增</text>
  <rect x="154" y="206" width="110" height="74" rx="5" fill="#EBF3FB" stroke="#6C8EBD" stroke-width="0.8"/>
  <text x="209" y="222" text-anchor="middle" font-size="9.5" font-weight="600" fill="#3a5a8a">信号强度</text>
  <text x="209" y="237" text-anchor="middle" font-size="9" fill="#555">反馈次数</text>
  <text x="209" y="250" text-anchor="middle" font-size="9" fill="#555">一致性程度</text>
  <text x="209" y="263" text-anchor="middle" font-size="9" fill="#555">观察清晰度</text>
  <text x="209" y="275" text-anchor="middle" font-size="8.5" fill="#888">[弱/中/强]</text>
  <rect x="274" y="206" width="122" height="74" rx="5" fill="#EBF3FB" stroke="#6C8EBD" stroke-width="0.8"/>
  <text x="335" y="222" text-anchor="middle" font-size="9.5" font-weight="600" fill="#3a5a8a">时效性</text>
  <text x="335" y="237" text-anchor="middle" font-size="9" fill="#555">几秒前 vs 几月前</text>
  <text x="335" y="250" text-anchor="middle" font-size="9" fill="#555">实时 vs 历史</text>
  <text x="335" y="263" text-anchor="middle" font-size="9" fill="#555">近期异常标记</text>
  <text x="335" y="275" text-anchor="middle" font-size="8.5" fill="#888">防止短期漂移</text>
  <rect x="20" y="306" width="390" height="90" rx="7" fill="#2d3748"/>
  <text x="215" y="326" text-anchor="middle" font-size="10" font-weight="700" fill="#e2e8f0">冲突检测 · 显式标记给 L3</text>
  <text x="36" y="344" font-size="9" fill="#90cdf4">历史偏好 [强·18次]：工作+专注 → 主动服务 → 偏向拒绝</text>
  <text x="36" y="358" font-size="9" fill="#68d391">实时观察 [清晰·此刻]：反复拿起空杯查看，持续2分钟</text>
  <text x="36" y="372" font-size="9" fill="#fbd38d">信号方向：相反 · 请综合判断本次是否主动服务</text>
  <text x="215" y="388" text-anchor="middle" font-size="8.5" fill="#718096">显式告知矛盾，而非让L3自行发现 · 提升判断可靠性</text>
  <line x1="112" y1="138" x2="112" y2="430" stroke="#aaa" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="312" y1="138" x2="312" y2="430" stroke="#aaa" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="525" y1="348" x2="525" y2="430" stroke="#aaa" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="743" y1="138" x2="743" y2="430" stroke="#aaa" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="215" y1="396" x2="215" y2="430" stroke="#aaa" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="112" y1="430" x2="743" y2="430" stroke="#aaa" stroke-width="1"/>
  <line x1="430" y1="430" x2="430" y2="448" stroke="#aaa" stroke-width="1.4" marker-end="url(#d)"/>
  <rect x="240" y="448" width="380" height="56" rx="8" fill="#6C8EBD"/>
  <text x="430" y="469" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">L3 认知层  ·  综合判断</text>
  <text x="430" y="486" text-anchor="middle" font-size="9.5" fill="#EBF3FB">Qwen3-7B · 权衡所有信号 · 输出 SubTask[]</text>
  <text x="430" y="499" text-anchor="middle" font-size="9" fill="#dbeafe">显式声明 &gt; 实时观察（清晰）&gt; 历史偏好（强）&gt; 历史偏好（弱）</text>
  <line x1="430" y1="504" x2="430" y2="524" stroke="#aaa" stroke-width="1.4" marker-end="url(#d)"/>
  <rect x="160" y="524" width="540" height="66" rx="7" fill="#EEF7EB" stroke="#82b366" stroke-width="1.4"/>
  <text x="430" y="543" text-anchor="middle" font-size="10" font-weight="700" fill="#3a6b3a">结果反哺 · 记录判断过程，不只是结果</text>
  <text x="430" y="558" text-anchor="middle" font-size="9.5" fill="#555">记录：实时观察压过历史偏好 → 主动倒水 → 被接受</text>
  <text x="430" y="572" text-anchor="middle" font-size="9" fill="#777">积累元规律："身体语言信号清晰时可覆盖历史偏好"</text>
  <text x="430" y="584" text-anchor="middle" font-size="8.5" fill="#999">异常检测：短期反馈偏移先标记，持续才更新 · 防止漂移</text>
  <path d="M 160 557 Q 80 557 80 300 Q 80 138 200 138" stroke="#82b366" stroke-width="1.2" fill="none" stroke-dasharray="5,3" marker-end="url(#dg)"/>
  <text x="58" y="360" font-size="9" fill="#82b366" transform="rotate(-90,58,360)">反哺偏好库</text>
  <defs>
    <marker id="d" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#aaa"/>
    </marker>
    <marker id="dg" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#82b366"/>
    </marker>
  </defs>
</svg>
